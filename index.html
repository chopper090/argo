<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Obiettivi & Note</title>

<!-- =====================================================================
     OBIETTIVI & NOTE  ·  codename "Argo"  ·  core single-file (Fase 2)
     Direzione: IBRIDO A+C — bottom-nav + FAB + liste dense; Storico a griglia.
     Offline-first: localStorage granulare (sorgente di verità della UI) +
     adapter Firestore opzionale (sync realtime, config-driven, vedi [FB]).

     TABLE OF CONTENTS
       [HEAD]   anti-FOUC · meta theme-color · fonts
       [CSS-1]  token caldi (light/dark) + categorical palette
       [CSS-2]  shell (header, bottom-nav, FAB, sheet, toast, focus)
       [CSS-3]  componenti (card, check, chip, ring, chart, field…)
       [CSS-4]  schermate (home / storico / spese / note)
       [JS-1]   utils (date, id, slug NFD, i18n, icone, grafici SVG)
       [JS-2]   STORE: localStorage granulare + migrazioni + seed demo + routine (ricorrenza)
       [JS-3]   Firestore adapter (gated) [FB]
       [JS-4]   stato + derive (stats: completamento, streak, lacune…)
       [JS-5]   render() + renderHome/Storico/Spese/Note/Settings
       [JS-6]   azioni (CRUD goals/notes/expenses) via event-delegation
       [JS-7]   export (json/html/csv/md/ics/xlsx) + import
       [JS-8]   temi · focus-mode · layout-vars · i18n · init
     ===================================================================== -->

<script>/* [HEAD] anti-FOUC */(function(){try{var t=localStorage.getItem('argo.theme');
  if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  var sc=localStorage.getItem('argo.screen');if(sc==='mobile'||sc==='desktop')document.documentElement.setAttribute('data-screen',sc);}catch(e){}})();</script>

<style>
/* ============================ [CSS-1] TOKENS ============================ */
:root{
  color-scheme:light;
  --bg:#F6F4EE; --surface:#FFFFFF; --surface-2:#EFECE3; --surface-3:#E6E1D2;
  --border:#DDD7C7; --border-strong:#C5BDA6; --border-subtle:#ECE7DA;
  --text:#1A1D24; --text-muted:#5B626E; --text-subtle:#7B8290; --text-inverse:#FFFFFF;
  --accent:#C15F3C; --accent-2:#E0A028; --accent-soft:#F3E4D8;
  --ok:#5E8C4A; --ok-bg:#E7EFDD; --warn:#BD7223; --bad:#C0492F; --bad-bg:#F6E2DC;
  --r-sm:8px; --r-md:13px; --r-lg:20px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(20,18,12,.06),0 1px 3px rgba(20,18,12,.05);
  --shadow-md:0 2px 5px rgba(20,18,12,.08),0 7px 18px rgba(20,18,12,.08);
  --shadow-lg:0 8px 26px rgba(20,18,12,.13),0 20px 52px rgba(20,18,12,.15);
  --font-ui:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --cat-Spesa:#C15F3C; --cat-Cibo:#E0A028; --cat-Trasporti:#4E8D7C;
  --cat-Casa:#7A6FB0; --cat-Svago:#D06A8C; --cat-Varie:#9A8E78; --cat-_:#9A8E78;
  /* layout-vars regolabili da impostazioni */
  --ui:1; --sp:1; --cr:1; --tx:1;
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#15171C; --surface:#1C1F26; --surface-2:#232730; --surface-3:#2C313C;
  --border:#2F3540; --border-strong:#434A57; --border-subtle:#232730;
  --text:#ECE9E0; --text-muted:#A8AEBA; --text-subtle:#858C99; --text-inverse:#15171C;
  --accent:#E07A52; --accent-2:#EBB44E; --accent-soft:#2E2620;
  --ok:#7FB069; --ok-bg:#26301F; --warn:#D89A4A; --bad:#E0795E; --bad-bg:#33211C;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.30);
  --shadow-md:0 2px 6px rgba(0,0,0,.45),0 8px 22px rgba(0,0,0,.42);
  --shadow-lg:0 10px 32px rgba(0,0,0,.6),0 22px 60px rgba(0,0,0,.62);
  --cat-Spesa:#D8714C; --cat-Cibo:#EBB44E; --cat-Trasporti:#5FA593;
  --cat-Casa:#9488C7; --cat-Svago:#E083A3; --cat-Varie:#B0A488; --cat-_:#B0A488;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:calc(16px*var(--tx));
  line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;color:inherit;border:0;background:none}
[data-act],[data-cat],[data-ac],[data-day],[data-edit],[data-toggle],[data-del],[data-delcat],[data-h],[data-pm],[data-rt],[data-pre],[data-x],[data-k],label,.chip,.check,.swatch,.switch,.weekchip,.card.lift{cursor:pointer}
input,textarea,select{font-family:inherit}
.eyebrow{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text-muted)}
.mono{font-family:var(--font-mono)}
.muted{color:var(--text-muted)} .subtle{color:var(--text-subtle)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;border:3px solid var(--bg)}
svg{display:block}

/* ============================ [CSS-2] SHELL ============================ */
#app{max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative;
  zoom:var(--ui)}
.apphead{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  padding:14px 18px 12px;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border)}
.apphead .ttl{display:flex;flex-direction:column;gap:1px;margin-right:auto;min-width:0}
.apphead .ttl h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.apphead .iconbtn{width:38px;height:38px;border-radius:var(--r-md);display:grid;place-items:center;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.apphead .iconbtn:active{transform:scale(.94)}
@media(hover:hover){.apphead .iconbtn:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}}
.apphead .iconbtn svg{width:19px;height:19px}
.synced{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle)}
.synced .dot{width:7px;height:7px;border-radius:50%;background:var(--text-subtle)}
.synced.on .dot{background:var(--ok)} .synced.off .dot{background:var(--warn)}

main{flex:1 1 auto;padding:16px 16px 120px;width:100%}
.scrollarea{outline:none}

.bottomnav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:680px;height:70px;
  display:flex;align-items:center;justify-content:space-around;z-index:30;
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-subtle);
  font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;width:58px;padding:6px 0}
.bottomnav button svg{width:23px;height:23px}
.bottomnav button.on{color:var(--accent)}
.bottomnav .fab{width:56px;height:56px;border-radius:50%;color:#fff;
  background:radial-gradient(circle at 50% 28%,color-mix(in srgb,var(--accent) 82%,#fff),var(--accent));
  display:grid;place-items:center;margin-top:-26px;border:4px solid var(--bg);
  box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 50%,transparent),0 2px 6px rgba(20,18,12,.22)}
.bottomnav .fab svg{width:27px;height:27px}
.bottomnav .fab:active{transform:scale(.92)}

/* sheet (bottom sheet / modal) */
.scrim{position:fixed;inset:0;background:rgba(20,18,12,.46);opacity:0;pointer-events:none;transition:.22s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:0;width:100%;max-width:680px;
  z-index:50;background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:0;
  box-shadow:var(--shadow-lg);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:92vh;display:flex;flex-direction:column}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sheet .grab{width:40px;height:4px;border-radius:99px;background:var(--border-strong);margin:10px auto 4px}
.sheet .shead{display:flex;align-items:center;gap:10px;padding:6px 20px 12px}
.sheet .shead h2{margin:0;font-size:18px;font-weight:700}
.sheet .sbody{padding:0 20px 24px;overflow:auto}
.sheet .x{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center}

.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(16px);background:var(--text);
  color:var(--bg);padding:11px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:90%}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.focus{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;overflow:auto;
  padding:clamp(20px,6vw,50px);background:radial-gradient(1100px 520px at 50% -8%,var(--accent-soft),transparent 60%),var(--bg)}
.focus.on{display:flex}
.focus .fhead{display:flex;align-items:center;gap:14px;margin-bottom:8px;max-width:640px;width:100%;margin-inline:auto}
.focus .fhead h2{margin:0;font-size:clamp(24px,5vw,40px);letter-spacing:-.02em}
.focus .fsub{max-width:640px;width:100%;margin:0 auto 26px}
.focus .fhero{max-width:640px;width:100%;margin:0 auto 20px;display:flex;align-items:center;gap:18px;
  background:linear-gradient(135deg,var(--accent-soft),var(--surface));border:1px solid var(--border-strong);
  border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow-md)}
.focus .fbignum{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.focus .fbignum span{font-size:15px;font-weight:600;color:var(--text-muted)}
.focus .fmeta{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-top:4px}
.focus .fdone{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:12px;font-weight:700;color:var(--ok)}
.focus .fdone svg{width:15px;height:15px;stroke:var(--ok)}
.focus .fbig{max-width:640px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.focus .fgoal{padding:15px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--shadow-md);transition:box-shadow .16s}
.focus .fgoal.done{opacity:.62}
.focus .fgrow{display:flex;align-items:center;gap:15px;font-size:18px;font-weight:600;cursor:pointer}
.focus .fgoal.done .fgrow>.grow{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:color-mix(in srgb,var(--text-subtle) 60%,transparent);color:var(--text-subtle)}
.focus .fpill{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:var(--r-pill);flex:0 0 auto}
.focus .fprog{height:6px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin:13px 2px 2px;box-shadow:inset 0 1px 2px rgba(20,18,12,.08)}
.focus .fprog i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.focus .fsubs{display:flex;flex-direction:column;margin-top:6px}
.focus .fsub2{display:flex;align-items:center;gap:13px;padding:10px 4px;font-size:15px;color:var(--text-muted);border-top:1px solid var(--border-subtle);cursor:pointer}
.focus .fsub2.done .grow{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:color-mix(in srgb,var(--text-subtle) 70%,transparent);color:var(--text-subtle)}
.focus .ftrend{max-width:640px;width:100%;margin:24px auto 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-md);padding:15px 18px 14px}
.focus .ftrend .eyebrow{margin-bottom:13px;display:block}
.focus .ftval{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);min-height:14px;line-height:1}
.focus .ftrend .bartrack{max-width:34px}
/* INTRO primo avvio */
.intro{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(20px,6vw,48px);overflow:auto;background:radial-gradient(1200px 560px at 50% -10%,var(--accent-soft),transparent 60%),var(--bg)}
.intro.on{display:flex}
.introwrap{max-width:460px;width:100%;margin:auto;display:flex;flex-direction:column;align-items:center;text-align:center;gap:15px}
.introicon{width:76px;height:76px;border-radius:21px;box-shadow:var(--shadow-lg)}
.introwrap h2{margin:1px 0 0;font-size:clamp(23px,6vw,31px);letter-spacing:-.02em}
.introtag{color:var(--text-muted);font-size:15px;margin:0;max-width:32ch;line-height:1.5}
.introhead2{display:flex;flex-direction:column;align-items:center;gap:14px}
.introvidwrap{position:relative;display:inline-block;line-height:0;max-width:100%}
.introvid{display:block;height:min(64vh,520px);max-width:100%;aspect-ratio:9/16;border-radius:var(--r-lg);border:1px solid var(--border-strong);box-shadow:var(--shadow-lg);background:#000;object-fit:cover;cursor:pointer}
.introaudio{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:6px;background:rgba(20,18,12,.6);color:#fff;border-radius:var(--r-pill);padding:7px 14px;font-size:12px;font-weight:700;backdrop-filter:blur(4px)}
.introaudio svg{width:15px;height:15px;stroke:#fff}
.introph{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-md);padding:18px}
.introhi{display:flex;flex-direction:column;gap:12px;text-align:left}
.introhi .li{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600}
.introhi .li .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:0 0 auto}
.introphnote{margin-top:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);border-top:1px dashed var(--border-strong);padding-top:12px}
.intro .btn{max-width:320px;margin-top:4px}
.introskip{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);padding:8px}

/* ========================== [CSS-3] COMPONENTI ========================== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:calc(var(--r-md)*var(--cr));
  box-shadow:var(--shadow-md);padding:calc(14px*var(--sp))}
.card.lift{transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease} .card.lift:active{transform:scale(.99)}
@media(hover:hover){.card.lift:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border-strong)}}
.row{display:flex;align-items:center;gap:11px}
.col{display:flex;flex-direction:column}
.grow{flex:1 1 auto;min-width:0}
.spacer{flex:1 1 auto}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
h2.sec{font-size:13px;font-weight:700;margin:22px 4px 11px;display:flex;align-items:center;gap:8px}
h2.sec .eyebrow{margin-left:auto}

.check{width:23px;height:23px;border-radius:7px;border:2px solid var(--border-strong);flex:0 0 auto;
  display:grid;place-items:center;transition:.14s;background:var(--surface)}
.check svg{width:14px;height:14px;stroke:#fff;opacity:0;transition:.14s}
.check.on{background:var(--accent);border-color:var(--accent)} .check.on svg{opacity:1}
.check.sm{width:19px;height:19px;border-radius:6px}
.strike{position:relative}
.done>.strike,.done .strikeable{color:var(--text-subtle);text-decoration:line-through;text-decoration-color:color-mix(in srgb,var(--text-subtle) 70%,transparent);text-decoration-thickness:2px;text-underline-offset:0}

.pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border-subtle)}
.pill.ok{background:var(--ok-bg);color:var(--ok);border-color:transparent}
.pill.accent{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.pill.bad{background:var(--bad-bg);color:var(--bad);border-color:transparent}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:6px 12px;border-radius:var(--r-pill);
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-sm)}
.chip .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.03em;color:var(--accent);background:var(--accent-soft);
  padding:2px 7px;border-radius:6px}
.iconmini{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}

.progressbar{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;box-shadow:inset 0 1px 2px rgba(20,18,12,.08)}
.progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .3s}
.stat .v{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat .v small{font-size:13px;font-weight:600;color:var(--text-muted)}
.stat .k{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:4px}

.field{width:100%;padding:12px 13px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);
  color:var(--text);font-size:15px;outline:none}
.field:focus{border-color:var(--accent)}
.field::placeholder{color:var(--text-subtle)}
textarea.field{resize:vertical;line-height:1.6;min-height:90px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:var(--r-md);
  background:var(--accent);color:#fff;font-weight:700;font-size:15px;box-shadow:var(--shadow-md);width:100%;transition:transform .12s,box-shadow .16s,filter .16s}
.btn:active{transform:scale(.99)}
@media(hover:hover){.btn:hover{box-shadow:var(--shadow-lg);filter:brightness(1.04)}.btn.ghost:hover{filter:none;border-color:var(--border-strong);box-shadow:var(--shadow-md)}}
.btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:none}
.btn.sm{padding:9px 14px;font-size:13px;width:auto}
.btn.danger{background:var(--bad)}
.iconaction{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-subtle);transition:.14s}
.iconaction:active{background:var(--surface-2)}
@media(hover:hover){.iconaction:hover{background:var(--surface-2);color:var(--text)}}
.iconaction svg{width:17px;height:17px}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.keypad button{padding:16px 0;font-size:21px;font-weight:600;background:var(--surface-2);border-radius:var(--r-sm);font-family:var(--font-mono)}
.keypad button:active{background:var(--surface-3)}

.empty{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;color:var(--text-muted);
  padding:46px 20px}
.empty svg{width:42px;height:42px;opacity:.4}
.legend{display:flex;flex-direction:column;gap:8px}
.legend .li{display:flex;align-items:center;gap:9px;font-size:13px}
.legend .li .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.legend .li b{margin-left:auto;font-family:var(--font-mono)}
.weekheat{display:flex;gap:5px}.weekheat i{flex:1;height:32px;border-radius:5px;background:var(--accent);display:block}

function weekHeat(vals){return `<div class="weekheat">${vals.map(v=>`<i style="opacity:${0.16+clamp(v,0,1)*0.84}"></i>`).join('')}</div><div class="heatlabels">${(LANG==='it'?DOW:DOWen).map(x=>`<span>${x[0].toUpperCase()}</span>`).join('')}</div>`;}

/* ===================== ROUTINE (ricorrenza obiettivi) =====================
   Le routine sono i template ricorrenti; ogni giorno/settimana previsto
   generano da sole l'istanza obiettivo collegata via routineId. lastRun
   evita doppioni e impedisce che un'istanza cancellata oggi risorga.        */
function instFromRoutine(r,extra){return Object.assign({id:uid(),title:r.title,done:false,completedAt:null,
  createdAt:Date.now(),routineId:r.id,subtasks:(r.subtasks||[]).map(s=>({id:uid(),title:s.title,done:false}))},extra);}
function materializeRoutines(){
 const today=todayStr(), dow=(parseYmd(today).getDay()+6)%7, wk=weekKey(today);
 const routines=DB.routines(); if(!routines.length)return;
 const goals=DB.goals(); let changed=false;
 routines.forEach(r=>{
  if(!r.active)return;
  if(r.type==='weekly'){
   if(r.lastRun===wk)return;
   goals.push(instFromRoutine(r,{type:'weekly',weekOf:wk,order:goals.filter(g=>g.type==='weekly'&&g.weekOf===wk).length}));
   r.lastRun=wk; changed=true;
  }else{
   if(r.lastRun===today)return;
   const days=(r.days&&r.days.length)?r.days:[0,1,2,3,4,5,6];
   if(!days.includes(dow))return;
   goals.push(instFromRoutine(r,{type:'daily',date:today,order:goals.filter(g=>g.type==='daily'&&g.date===today).length}));
   r.lastRun=today; changed=true;
  }
 });
 if(changed){DB.saveRoutines(routines);DB.saveGoals(goals);}
}
function freqLabel(r){
 if(r.type==='weekly')return T('ogniSett');
 const d=r.days||[];
 if(d.length>=7)return T('tuttiGiorni');
 if(d.length===5&&[0,1,2,3,4].every(x=>d.includes(x)))return T('feriali');
 if(d.length===2&&d.includes(5)&&d.includes(6))return T('weekendF');
 const names=(LANG==='it'?DOW:DOWen);
 return d.slice().sort((a,b)=>a-b).map(i=>names[i][0].toUpperCase()).join(' ')||T('frequenza');
}
/* Carry-over: COPIA (non sposta) gli obiettivi NON di routine rimasti incompleti
   dal giorno precedente più recente (entro 14gg) a oggi, marcando la sorgente
   `carried` per non duplicarla. Ieri resta onesto → streak/lacune intatte.       */
function carryOverGoals(){
 if(!DB.settings().carryOver)return;
 const today=todayStr(), goals=DB.goals();
 let src=null;
 for(let i=1;i<=14;i++){const ds=ymd(addDays(parseYmd(today),-i));if(goals.some(g=>g.type==='daily'&&g.date===ds)){src=ds;break;}}
 if(!src)return;
 const pending=goals.filter(g=>g.type==='daily'&&g.date===src&&!g.routineId&&!g.carried&&!goalComplete(g));
 let changed=false;
 pending.forEach(g=>{
  if(!goals.some(x=>x.carriedFrom===g.id)){
   goals.push({id:uid(),type:'daily',date:today,title:g.title,done:false,completedAt:null,
    order:goals.filter(x=>x.type==='daily'&&x.date===today).length,createdAt:Date.now(),carriedFrom:g.id,
    subtasks:(g.subtasks||[]).map(s=>({id:uid(),title:s.title,done:s.done}))});
  }
  g.carried=true;changed=true;
 });
 if(changed)DB.saveGoals(goals);
}

/* =================== [JS-3] Firestore adapter (gated) [FB] ===================
   Attivo SOLO se l'utente incolla la config (Impostazioni → Firebase).
   - offline persistence ON (cache locale + sync realtime via onSnapshot)
   - dati sotto users/{uid}/{coll}; rules bloccate all'UID proprietario.
   Quando non configurato, l'app è 100% locale: tutto funziona offline.        */
const Cloud={
 app:null,auth:null,fs:null,uid:null,ready:false,unsub:[],
 cfg(){return DB.settings().firebase||null;},
 async init(){const cfg=this.cfg();if(!cfg||!cfg.apiKey)return;
  try{
   const[{initializeApp},{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut},
    {initializeFirestore,persistentLocalCache,persistentMultipleTabManager,collection,onSnapshot,doc,setDoc,deleteDoc,writeBatch}]=await Promise.all([
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js')]);
   this.app=initializeApp(cfg);this.auth=getAuth(this.app);
   this.fs=initializeFirestore(this.app,{localCache:persistentLocalCache({tabManager:persistentMultipleTabManager()})});
   this._api={collection,onSnapshot,doc,setDoc,deleteDoc,writeBatch,signInWithEmailAndPassword,signOut};
   onAuthStateChanged(this.auth,u=>{this.uid=u?u.uid:null;this.ready=!!u;this.bind();setSync(u?'on':'off');});
  }catch(e){console.warn('Firebase init fallita',e);setSync('off');}
 },
 async signIn(email,pw){if(!this.auth)await this.init();return this._api.signInWithEmailAndPassword(this.auth,email,pw);},
 async signOutNow(){this.unbind();if(this.auth)await this._api.signOut(this.auth);this.uid=null;this.ready=false;setSync(null);},
 bind(){this.unbind();if(!this.ready)return;const {collection,onSnapshot}=this._api;
  ['goals','notes','expenses'].forEach(c=>{const ref=collection(this.fs,'users',this.uid,c);
   this.unsub.push(onSnapshot(ref,snap=>{const arr=[];snap.forEach(d=>arr.push(d.data()));
    LS.set(c,arr);if(state.tab)render();},err=>console.warn(c,err)));});},
 unbind(){this.unsub.forEach(u=>{try{u();}catch(e){}});this.unsub=[];},
 async push(coll,arr){ if(!this.ready||!this.uid)return; const {doc,setDoc}=this._api;
  try{for(const o of arr){await setDoc(doc(this.fs,'users',this.uid,coll,o.id),o);} }catch(e){/* offline: la cache Firestore riproverà */} }
};

function goalDoneRatio(g){if(g.subtasks&&g.subtasks.length){const d=g.subtasks.filter(s=>s.done).length;return[d,g.subtasks.length];}return[g.done?1:0,1];}
function goalComplete(g){if(g.subtasks&&g.subtasks.length)return g.subtasks.every(s=>s.done);return!!g.done;}
function dailyOf(date){return DB.goals().filter(g=>g.type==='daily'&&g.date===date).sort((a,b)=>a.order-b.order);}
function weeklyOf(wk){return DB.goals().filter(g=>g.type==='weekly'&&g.weekOf===wk).sort((a,b)=>a.order-b.order);}
function longGoals(){return DB.goals().filter(g=>g.type==='long').sort((a,b)=>(a.due||'9999-99-99').localeCompare(b.due||'9999-99-99')||a.order-b.order);}
function endOfPeriod(h){const now=new Date(),y=now.getFullYear(),m=now.getMonth();
 if(h==='quarter')return ymd(new Date(y,Math.floor(m/3)*3+3,0));
 if(h==='semester')return ymd(new Date(y,m<6?6:12,0));
 if(h==='year')return ymd(new Date(y,12,0));
 return todayStr();}
function shortDate(s){const d=parseYmd(s),mon=(LANG==='it'?MON:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']);
 return d.getDate()+' '+mon[d.getMonth()].slice(0,3)+(d.getFullYear()!==new Date().getFullYear()?' '+d.getFullYear():'');}
function horizonLabel(g){if(g.horizon==='date')return T('scadeIl')+' '+(g.due?shortDate(g.due):'');
 const d=g.due?parseYmd(g.due):new Date(),m=d.getMonth(),y=d.getFullYear();
 if(g.horizon==='quarter')return 'Q'+(Math.floor(m/3)+1)+' '+y;
 if(g.horizon==='semester')return LANG==='it'?(m<6?'1° sem ':'2° sem ')+y:'H'+(m<6?1:2)+' '+y;
 if(g.horizon==='year')return ''+y;return '';}
function dayCompletion(date){const a=dailyOf(date);if(!a.length)return null;return a.filter(goalComplete).length/a.length;}
function streak(){let s=0,d=new Date();for(let i=0;i<400;i++){const c=dayCompletion(ymd(d));if(c===null)break;if(c>=1)s++;else break;d=addDays(d,-1);}return s;}
function last7(){const out=[];for(let i=6;i>=0;i--){const ds=ymd(addDays(new Date(),-i));const c=dayCompletion(ds);out.push({label:(LANG==='it'?DOW:DOWen)[(parseYmd(ds).getDay()+6)%7][0].toUpperCase(),value:c==null?0:c,dim:c==null||c<0.5});}return out;}
function completedPerDay(n){const out=[];for(let i=n-1;i>=0;i--){const ds=ymd(addDays(new Date(),-i));
  const c=dailyOf(ds).reduce((acc,g)=>acc+((g.subtasks&&g.subtasks.length)?g.subtasks.filter(s=>s.done).length:(g.done?1:0)),0);
  out.push({label:(LANG==='it'?DOW:DOWen)[(parseYmd(ds).getDay()+6)%7][0].toUpperCase(),value:c});}return out;}
function emptyDaysThisMonth(){const now=new Date(),y=now.getFullYear(),m=now.getMonth();let n=0;
 for(let d=1;d<=now.getDate();d++){const ds=ymd(new Date(y,m,d));const hasGoals=dailyOf(ds).length>0;
  const hasExp=DB.expenses().some(e=>e.date===ds);const hasNote=DB.notes().some(nt=>ymd(new Date(nt.createdAt))===ds);
  if(!hasGoals&&!hasExp&&!hasNote)n++;}return n;}
function recurringGaps(){const map={};const days=30;
 for(let i=0;i<days;i++){const ds=ymd(addDays(new Date(),-i));dailyOf(ds).forEach(g=>{const k=g.title.trim().toLowerCase();
  (map[k]=map[k]||{title:g.title,seen:0,missed:0}); map[k].seen++; if(!goalComplete(g))map[k].missed++;});}
 return Object.values(map).filter(x=>x.seen>=3&&x.missed>=2).sort((a,b)=>b.missed-a.missed).slice(0,4);}
function monthExpenses(){const now=new Date(),p=now.getFullYear()+'-'+pad(now.getMonth()+1);return DB.expenses().filter(e=>e.date.startsWith(p));}
function spendByCat(list){const m={};DB.cats().forEach(c=>m[c]=0);list.forEach(e=>{m[e.category]=(m[e.category]||0)+Number(e.amount);});return m;}

/* ===================== [JS-6] AZIONI (event-delegation) ===================== */
function findGoal(id){return DB.goals().find(g=>g.id===id);}
function withGoals(fn){const a=DB.goals();fn(a);DB.saveGoals(a);render();}

document.addEventListener('click',e=>{
 const el=e.target.closest('[data-act]');if(!el)return;
 const act=el.dataset.act,id=el.dataset.id;
 switch(act){
  case 'tab': state.tab=el.dataset.tab; render(); $('#view').scrollTo(0,0); window.scrollTo(0,0); break;
  case 'toggle-theme': setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); break;
  case 'toggle-goal': withGoals(a=>{const g=a.find(x=>x.id===id);if(!g)return;
    if(g.subtasks&&g.subtasks.length){const all=g.subtasks.every(s=>s.done);g.subtasks.forEach(s=>s.done=!all);g.done=!all;}
    else g.done=!g.done; g.completedAt=goalComplete(g)?Date.now():null;}); break;
  case 'toggle-sub': withGoals(a=>{const g=a.find(x=>x.id===id);if(!g)return;const s=g.subtasks.find(x=>x.id===el.dataset.sid);if(s)s.done=!s.done;
    g.done=g.subtasks.every(x=>x.done);g.completedAt=goalComplete(g)?Date.now():null;}); break;
  case 'expand-goal': state.expandGoals[id]=!state.expandGoals[id]; render(); break;
  case 'del-goal': withGoals(a=>{const i=a.findIndex(x=>x.id===id);if(i>=0)a.splice(i,1);}); break;
  case 'del-sub': withGoals(a=>{const g=a.find(x=>x.id===id);if(g)g.subtasks=g.subtasks.filter(s=>s.id!==el.dataset.sid);}); break;
  case 'move-goal': { const dir=+el.dataset.dir; const g=findGoal(id); if(!g)break;
    const sib=(g.type==='daily'?dailyOf(g.date):g.type==='long'?longGoals():weeklyOf(g.weekOf)); const idx=sib.findIndex(x=>x.id===id); const j=idx+dir;
    if(j<0||j>=sib.length)break; withGoals(a=>{const A=a.find(x=>x.id===sib[idx].id),B=a.find(x=>x.id===sib[j].id);const o=A.order;A.order=B.order;B.order=o;}); break; }
  case 'del-expense': { const a=DB.expenses().filter(x=>x.id!==id);DB.saveExpenses(a);render(); break; }
  case 'recur-goal': { const g=findGoal(id); if(!g)break; const r=g.routineId&&DB.routines().find(x=>x.id===g.routineId);
    openRoutineSheet(r?{routine:r}:{fromGoal:g}); break; }
  case 'open-routines': openRoutines(); break;
  case 'add-long': openLongGoalSheet(); break;
  case 'edit-long': { const g=findGoal(id); if(g)openLongGoalSheet(g); break; }
  case 'quick-add': openQuickAdd(); break;
  case 'quick-expense': openExpenseSheet(); break;
  case 'quick-note': openNoteSheet(); break;
  case 'edit-note': openNoteSheet(DB.notes().find(n=>n.id===id)); break;
  case 'note-tag': state.noteTag=el.dataset.tag; render(); break;
  case 'add-weekly': case 'open-weekly': { const g=findGoal(id); openGoalSheet(g||{type:'weekly'}); break; }
  case 'focus-mode': openFocus(); break;
  case 'open-settings': openSettings(); break;
  case 'open-export': openExport(); break;
  case 'close-sheet': closeSheet(); break;
 }
});
/* input handlers */
document.addEventListener('keydown',e=>{
 const el=e.target.closest('[data-act]');if(!el||e.key!=='Enter')return;
 if(el.dataset.act==='add-goal-input'){const v=el.value.trim();if(!v)return;addGoal(el.dataset.type,v);el.value='';}
 if(el.dataset.act==='add-sub-input'){const v=el.value.trim();if(!v)return;addSub(el.dataset.id,v);}
});
document.addEventListener('input',e=>{
 const el=e.target.closest('[data-act]');if(!el)return;
 if(el.dataset.act==='note-search'){state.noteSearch=el.value;const list=$('#view');/* re-render solo lista */ render();
   const inp=$('[data-act="note-search"]');if(inp){inp.focus();inp.setSelectionRange(el.value.length,el.value.length);} }
});

function addGoal(type,title){const a=DB.goals();const t=todayStr();
 const sib=type==='daily'?dailyOf(t):weeklyOf(weekKey(t));
 const g={id:uid(),type,title,done:false,order:sib.length,createdAt:Date.now(),completedAt:null,subtasks:[]};
 if(type==='daily')g.date=t;else g.weekOf=weekKey(t);
 a.push(g);DB.saveGoals(a);render();
 const inp=$(`[data-act="add-goal-input"][data-type="${type}"]`);if(inp)inp.focus();}
function addSub(goalId,title){withGoals(a=>{const g=a.find(x=>x.id===goalId);if(!g)return;g.subtasks=g.subtasks||[];g.subtasks.push({id:uid(),title,done:false});g.done=false;});
 state.expandGoals[goalId]=true;render();const inp=$(`[data-act="add-sub-input"][data-id="${goalId}"]`);if(inp)inp.focus();}

  if(idx<0&&fromGoal){const today=todayStr();if(routine.type==='daily'&&fromGoal.date===today)routine.lastRun=today;if(routine.type==='weekly'&&fromGoal.weekOf===weekKey(today))routine.lastRun=weekKey(today);}
  if(idx>=0)arr[idx]=routine;else arr.push(routine);DB.saveRoutines(arr);
  if(fromGoal&&idx<0){const gs=DB.goals(),g=gs.find(x=>x.id===fromGoal.id);if(g){g.routineId=routine.id;DB.saveGoals(gs);}}
  materializeRoutines();render();toast(T('ricorrente')+' ✓');back();};
 if(isEdit)$('#rDel').onclick=()=>{DB.saveRoutines(DB.routines().filter(x=>x.id!==routine.id));render();back();};

function renderFocus(){
 const t=todayStr(),daily=dailyOf(t);
 const doneGoals=daily.filter(goalComplete).length;
 const totTask=daily.reduce((n,g)=>n+((g.subtasks&&g.subtasks.length)?g.subtasks.length:1),0);
 const doneTask=daily.reduce((n,g)=>n+((g.subtasks&&g.subtasks.length)?g.subtasks.filter(s=>s.done).length:(g.done?1:0)),0);
 const pct=totTask?Math.round(doneTask/totTask*100):0;
 const allDone=daily.length>0&&doneGoals===daily.length;
 const trend=completedPerDay(7),tmax=Math.max(...trend.map(x=>x.value),1);
 $('#focus').innerHTML=`<div class="fhead">${ic('expand')}<h2>${T('modalitaOggi')}</h2><button class="iconbtn" id="fClose" style="margin-left:auto;width:38px;height:38px;border-radius:12px;background:var(--surface);border:1px solid var(--border)">${ic('x')}</button></div>
  <div class="fhero">${ring(pct,82,11)}
   <div class="grow"><div class="eyebrow">${prettyDate(t)}</div>
    <div class="fbignum">${doneGoals}/${daily.length} <span>${T('fatto')}</span></div>
    <div class="fmeta">${doneTask}/${totTask} task${streak()>0?` · ${streak()} ${LANG==='it'?'di fila':'streak'}`:''}</div>
    ${allDone?`<div class="fdone">${ic('check')} ${T('tuttoFatto')}</div>`:''}</div></div>
  <div class="fbig">${daily.length?daily.map(g=>{const hasSub=g.subtasks&&g.subtasks.length,[d,tot]=goalDoneRatio(g),comp=goalComplete(g);
    return `<div class="fgoal ${comp?'done':''}">
     <div class="fgrow" data-fgoal="${g.id}">${checkbox(comp)}<span class="grow">${esc(g.title)}</span>${hasSub?`<span class="fpill">${d}/${tot}</span>`:''}</div>
     ${hasSub?`<div class="fprog"><i style="width:${tot?d/tot*100:0}%"></i></div>
      <div class="fsubs">${g.subtasks.map(s=>`<div class="fsub2 ${s.done?'done':''}" data-fsub="${g.id}" data-sid="${s.id}">${checkbox(s.done,'sm')}<span class="grow">${esc(s.title)}</span></div>`).join('')}</div>`:''}
    </div>`;}).join(''):`<div class="muted" style="text-align:center;padding:30px">${T('nessunObiettivo')}</div>`}</div>
  <div class="ftrend"><span class="eyebrow">${T('taskCompletate')} · 7${LANG==='it'?'gg':'d'}</span>
   <div class="barchart" style="height:104px">${trend.map(it=>{const bh=it.value>0?Math.max(10,Math.round(it.value/tmax*100)):0;
    return `<div class="barcol"><span class="ftval">${it.value||''}</span><div class="bartrack"><div class="bar" style="height:${bh}%"></div></div><span class="bl">${it.label}</span></div>`;}).join('')}</div></div>`;
 $('#fClose').onclick=closeFocus;
 $$('#focus [data-fgoal]').forEach(row=>row.onclick=()=>{const id=row.dataset.fgoal;withGoals(a=>{const g=a.find(x=>x.id===id);if(!g)return;
   const all=g.subtasks&&g.subtasks.length?g.subtasks.every(s=>s.done):g.done;
   if(g.subtasks&&g.subtasks.length)g.subtasks.forEach(s=>s.done=!all);g.done=!all;g.completedAt=goalComplete(g)?Date.now():null;});renderFocus();});
 $$('#focus [data-fsub]').forEach(row=>row.onclick=e=>{e.stopPropagation();const id=row.dataset.fsub,sid=row.dataset.sid;withGoals(a=>{const g=a.find(x=>x.id===id);if(!g)return;
   const s=g.subtasks.find(x=>x.id===sid);if(s)s.done=!s.done;g.done=g.subtasks.every(x=>x.done);g.completedAt=goalComplete(g)?Date.now():null;});renderFocus();});
}

function download(name,content,type){const blob=content instanceof Blob?content:new Blob([content],{type:type||'text/plain'});

 const csv='﻿'+rows.map(r=>r.map(c=>/[",;\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c).join(';')).join('\n');

async function exportXLSX(){
 try{ if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  const X=window.XLSX, wb=X.utils.book_new();
  const exp=DB.expenses().slice().sort((a,b)=>a.date.localeCompare(b.date));
  const ws=X.utils.json_to_sheet(exp.map(e=>({Data:e.date,Categoria:e.category,Metodo:e.method||'',Importo:Number(e.amount),Nota:e.note||''})));
  ws['!cols']=[{wch:12},{wch:14},{wch:12},{wch:10},{wch:30}];X.utils.book_append_sheet(wb,ws,'Spese');
  // riepilogo mensile per categoria
  const piv={};exp.forEach(e=>{const m=e.date.slice(0,7);piv[m]=piv[m]||{};piv[m][e.category]=(piv[m][e.category]||0)+Number(e.amount);});
  const cats=DB.cats();const sum=[['Mese',...cats,T('totale')]];Object.keys(piv).sort().forEach(m=>{const r=[m];let tot=0;cats.forEach(c=>{const v=piv[m][c]||0;r.push(v);tot+=v;});r.push(tot);sum.push(r);});
  const ws2=X.utils.aoa_to_sheet(sum);X.utils.book_append_sheet(wb,ws2,T('riepilogoMese'));
  X.writeFile(wb,'spese-'+todayStr()+'.xlsx');
 }catch(e){toast('Excel non disponibile offline — uso CSV');exportCSV();}}

 toast(notes.length+' note esportate (.md)');}

   <div class="seg"><button data-th="light" class="${document.documentElement.getAttribute('data-theme')==='light'?'on':''}">${T('it')==='it'?'Chiaro':'Light'}</button><button data-th="dark" class="${document.documentElement.getAttribute('data-theme')==='dark'?'on':''}">${LANG==='it'?'Scuro':'Dark'}</button></div></div>
  <div class="settingrow"><div class="grow"><div class="lbl">${LANG==='it'?'Schermo':'Screen'}</div></div>
   <div class="seg"><button data-sc="auto" class="${(s.screen||'auto')==='auto'?'on':''}">Auto</button><button data-sc="mobile" class="${s.screen==='mobile'?'on':''}">Mobile</button><button data-sc="desktop" class="${s.screen==='desktop'?'on':''}">Desktop</button></div></div>
  <div class="settingrow"><div class="grow"><div class="lbl">${T('lingua')}</div></div>
   <div class="seg"><button data-lg="it" class="${LANG==='it'?'on':''}">IT</button><button data-lg="en" class="${LANG==='en'?'on':''}">EN</button></div></div>
  <div class="settingrow"><div class="grow"><div class="lbl">${T('accento')}</div></div>
   <div class="row" style="gap:8px">${ACCENTS.map(c=>`<span class="swatch ${s.accent===c||(!s.accent&&c==='#C15F3C')?'on':''}" data-ac="${c}" style="background:${c}"></span>`).join('')}</div></div>
  <div class="settingrow col" style="align-items:stretch;gap:9px"><div class="row"><span class="lbl grow">${T('scalaUI')}</span><span class="mono" id="uiV">${Math.round((l.ui||1)*100)}%</span></div><input type="range" id="uiR" min="0.85" max="1.2" step="0.01" value="${l.ui||1}"></div>
  <div class="settingrow col" style="align-items:stretch;gap:9px"><div class="row"><span class="lbl grow">${T('spaziatura')}</span><span class="mono" id="spV">${Math.round((l.sp||1)*100)}%</span></div><input type="range" id="spR" min="0.8" max="1.4" step="0.01" value="${l.sp||1}"></div>
  <div class="settingrow col" style="align-items:stretch;gap:9px"><div class="row"><span class="lbl grow">${T('raggio')}</span><span class="mono" id="crV">${Math.round((l.cr||1)*100)}%</span></div><input type="range" id="crR" min="0" max="1.6" step="0.02" value="${l.cr||1}"></div>
  <div class="settingrow col" style="align-items:stretch;gap:9px"><div class="row"><span class="lbl grow">${T('testo')}</span><span class="mono" id="txV">${Math.round((l.tx||1)*100)}%</span></div><input type="range" id="txR" min="0.9" max="1.15" step="0.01" value="${l.tx||1}"></div>

  <h2 class="sec">${T('categorie')} & ${T('budget')}</h2>
  <div class="settingrow col" style="align-items:stretch"><div class="row" style="flex-wrap:wrap;gap:7px" id="catMgr">${DB.cats().map(c=>`<span class="chip" data-cat="${esc(c)}"><span class="dot" style="background:${catVar(c)}"></span>${esc(c)} <b style="margin-left:4px;opacity:.6" data-delcat="${esc(c)}">✕</b></span>`).join('')}<span class="chip" id="addCat" style="border-style:dashed">${T('aggiungiCat')}</span></div></div>
  <div class="settingrow"><div class="grow"><div class="lbl">${T('budgetMensile')}</div></div><input class="field" id="budgetIn" type="number" value="${s.budget||400}" style="width:110px"></div>

  <h2 class="sec">${T('routine')}</h2>
  <button class="btn ghost" data-act="open-routines" style="justify-content:space-between"><span class="row" style="gap:8px">${ic('repeat')} ${T('gestisciRoutine')}</span><span class="pill">${DB.routines().length}</span></button>
  <div class="settingrow" style="margin-top:10px"><div class="grow"><div class="lbl">${T('carryOver')}</div><div class="desc">${T('carryOverDesc')}</div></div><span class="switch ${s.carryOver?'on':''}" id="carrySwitch"></span></div>

  <h2 class="sec">${T('firebaseTit')}</h2>
  <div class="settingrow col" style="align-items:stretch;gap:8px"><div class="desc">${T('firebaseDesc')}</div>
   <details class="fbhelp"><summary>${T('comeSync')}</summary>
    <ol>${(LANG==='it'?[
      'Crea un progetto gratuito su <b>console.firebase.google.com</b> (piano Spark, nessuna carta).',
      'Authentication → <b>Email/Password</b>: abilitala e crea il tuo utente (la tua email + una password).',
      'Firestore Database → crea il DB, poi <b>Rules</b>: incolla il contenuto di <code>firebase/firestore.rules</code> e Pubblica.',
      'Project settings ⚙️ → Le tue app → <b>Web</b> (&lt;/&gt;): copia il JSON di <code>firebaseConfig</code>.',
      'Incolla qui sotto config + email + password e premi <b>Connetti</b>. Da lì la sync è automatica e in tempo reale tra telefono e PC.'
    ]:[
      'Create a free project at <b>console.firebase.google.com</b> (Spark plan, no card).',
      'Authentication → <b>Email/Password</b>: enable it and create your user (your email + a password).',
      'Firestore Database → create it, then <b>Rules</b>: paste <code>firebase/firestore.rules</code> and Publish.',
      'Project settings ⚙️ → Your apps → <b>Web</b> (&lt;/&gt;): copy the <code>firebaseConfig</code> JSON.',
      'Paste config + email + password below and hit <b>Connect</b>. From there sync is automatic and realtime across phone and PC.'
    ]).map(x=>`<li>${x}</li>`).join('')}</ol></details>
   <textarea class="field" id="fbCfg" placeholder='{ "apiKey": "...", "authDomain": "...", "projectId": "..." }' style="min-height:70px;font-family:var(--font-mono);font-size:12px">${s.firebase?esc(JSON.stringify(s.firebase)):''}</textarea>
   <div class="row" style="gap:8px"><input class="field" id="fbEmail" placeholder="${T('email')}" style="flex:1"><input class="field" id="fbPw" type="password" placeholder="${T('password')}" style="flex:1"></div>
   <div class="row" style="gap:8px"><button class="btn sm" id="fbConnect">${T('connetti')} & ${T('accedi')}</button><button class="btn sm ghost" id="fbOut">${T('esci')}</button></div></div>

  <h2 class="sec">${T('datiSync')}</h2>
  <button class="btn ghost danger" id="wipeBtn" style="background:var(--bad);color:#fff">${ic('trash')} ${T('svuota')}</button>
  <div class="eyebrow" style="text-align:center;margin-top:18px">Obiettivi &amp; Note · Argo · offline-first</div>`);

 // wiring settings
 $$('#sheetBody [data-th]').forEach(b=>b.onclick=()=>{setTheme(b.dataset.th);$$('#sheetBody [data-th]').forEach(x=>x.classList.toggle('on',x===b));});
 $$('#sheetBody [data-lg]').forEach(b=>b.onclick=()=>{setLang(b.dataset.lg);openSettings();});
 $$('#sheetBody [data-sc]').forEach(b=>b.onclick=()=>{setScreen(b.dataset.sc);$$('#sheetBody [data-sc]').forEach(x=>x.classList.toggle('on',x===b));});
 $$('#sheetBody [data-ac]').forEach(b=>b.onclick=()=>{setAccent(b.dataset.ac);$$('#sheetBody [data-ac]').forEach(x=>x.classList.toggle('on',x===b));});
 const rng=(id,key,vid)=>{const r=$('#'+id);r.oninput=()=>{document.documentElement.style.setProperty('--'+key,r.value);$('#'+vid).textContent=Math.round(r.value*100)+'%';};
  r.onchange=()=>setLayoutVar(key,r.value);};
 rng('uiR','ui','uiV');rng('spR','sp','spV');rng('crR','cr','crV');rng('txR','tx','txV');
 $('#budgetIn').onchange=e=>{const s2=DB.settings();s2.budget=Number(e.target.value)||400;DB.saveSettings(s2);};
 $('#carrySwitch').onclick=()=>{const s2=DB.settings();s2.carryOver=!s2.carryOver;DB.saveSettings(s2);$('#carrySwitch').classList.toggle('on',s2.carryOver);if(s2.carryOver)carryOverGoals();render();};
 $('#addCat').onclick=()=>{const name=prompt(T('nomeCategoria'));if(name&&name.trim()){const c=DB.cats();if(!c.includes(name.trim())){c.push(name.trim());DB.saveCats(c);openSettings();}}};
 $$('#sheetBody [data-delcat]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();const c=DB.cats().filter(x=>x!==b.dataset.delcat);DB.saveCats(c);openSettings();});
 $('#fbConnect').onclick=async()=>{try{const cfg=JSON.parse($('#fbCfg').value);const s2=DB.settings();s2.firebase=cfg;DB.saveSettings(s2);
   await Cloud.init();await Cloud.signIn($('#fbEmail').value.trim(),$('#fbPw').value);toast('Firebase connesso ✓');closeSheet();}catch(e){toast('Config/login non validi');console.warn(e);}};
 $('#fbOut').onclick=async()=>{await Cloud.signOutNow();toast('Disconnesso');};
 $('#wipeBtn').onclick=()=>{if(confirm(T('svuotaConferma'))){DB.wipe();closeSheet();location.reload();}};
}

function toast(msg){const e=$('#toast');e.textContent=msg;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('on'),1700);}

/* INIT */
function init(){
 migrate();
 const s=DB.settings();
 if(s.lang)LANG=s.lang; document.documentElement.lang=LANG;
 setTheme(document.documentElement.getAttribute('data-theme')||'light');
 $('[data-act="open-settings"]').innerHTML=ic('set');
 $('[data-act="open-export"]').innerHTML=ic('share');
 applyLayout();applyAccent();applyScreen();
 seedIfEmpty();
 materializeRoutines();
 carryOverGoals();
 render();
 if(!LS.get('introSeen',false))showIntro();
 if(DB.settings().firebase)Cloud.init();else setSync(null);
}
init();
/* PWA: service worker per funzionamento offline + installabilità */
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
